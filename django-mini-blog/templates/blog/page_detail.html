{% extends "base.html" %}

{% block content %}
<div class="detail-shell">
    <h1 class="detail-title">{{ object.titulo }}</h1>
    <p class="detail-subtitle">{{ object.subtitulo }}</p>
    <p class="detail-meta">Autor: {{ object.autor.username }} · Fecha: {{ object.fecha }}</p>

    {% if object.imagen %}
        <img src="{{ object.imagen.url }}" alt="{{ object.titulo }}" class="detail-image">
    {% endif %}

    <div class="detail-content">
        {{ object.contenido|safe }}
    </div>

    <div class="detail-actions">
        <a class="btn btn-secondary" href="{% url 'pages_list' %}">Volver</a>

        {% if user.is_authenticated %}
            <a class="btn btn-primary" href="{% url 'page_edit' object.pk %}">Editar</a>
            <a class="btn btn-danger" href="{% url 'page_delete' object.pk %}">Borrar</a>
        {% endif %}
    </div>
</div>
{% endblock %}
