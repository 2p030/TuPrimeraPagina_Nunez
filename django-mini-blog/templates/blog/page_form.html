{% extends "base.html" %}

{% block content %}
<div class="form-shell">
    <h1 class="form-title">Formulario de página</h1>
    <p class="form-subtitle">Completa los datos para publicar contenido.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.media }}
        {{ form.as_p }}

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Guardar</button>
            <a class="btn btn-secondary" href="{% url 'pages_list' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
