{% extends "base.html" %}

{% block content %}
<div class="form-shell">
    <h1 class="form-title">Enviar mensaje</h1>
    <p class="form-subtitle">Escribe un mensaje y selecciónalo para otro usuario.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Enviar</button>
            <a class="btn btn-secondary" href="{% url 'inbox' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
