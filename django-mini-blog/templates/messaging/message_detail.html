{% extends "base.html" %}

{% block content %}
<div class="detail-shell">
    <h1 class="detail-title">{{ message.subject }}</h1>
    <p class="detail-meta">
        De: {{ message.sender.username }} · Para: {{ message.receiver.username }} · Fecha: {{ message.created_at }}
    </p>

    <div class="detail-content">
        <p>{{ message.body }}</p>
    </div>

    <div class="detail-actions">
        <a class="btn btn-secondary" href="{% url 'inbox' %}">Volver</a>
    </div>
</div>
{% endblock %}
